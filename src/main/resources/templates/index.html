<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TransferPath</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f7f9fc;
            color: #222222;
        }

        h1 {
            color: #1f4e79;
        }

        .search-box {
            background-color: white;
            padding: 20px;
            border: 1px solid #dddddd;
            max-width: 600px;
            margin-bottom: 30px;
        }

        label {
            display: inline-block;
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        select {
            padding: 8px;
            width: 250px;
            margin-bottom: 10px;
        }

        input[type="checkbox"] {
            width: auto;
            margin-right: 6px;
        }

        button {
            padding: 10px 18px;
            background-color: #1f4e79;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #163a5c;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
        }

        th,
        td {
            border: 1px solid #cccccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #e9eef5;
        }
    </style>
</head>

<body>
<h1>TransferPath</h1>
<p>Find universities based on your transfer profile.</p>

<div class="search-box">
    <label for="country">Country:</label><br>
    <input type="text" id="country" placeholder="USA">

    <br>

    <label for="gpa">GPA:</label><br>
    <input type="number" id="gpa" step="0.1" placeholder="3.4">

    <br>

    <label for="international">Accepts International Students:</label><br>
    <select id="international">
        <option value="">Any</option>
        <option value="true">Yes</option>
        <option value="false">No</option>
    </select>

    <br>

    <label>
        <input type="checkbox" id="fall">
        Fall Admission
    </label>

    <br>

    <label>
        <input type="checkbox" id="spring">
        Spring Admission
    </label>

    <br>

    <button onclick="searchUniversities()">Search</button>
</div>

<h2>Results</h2>

<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Country</th>
        <th>Minimum GPA</th>
        <th>International</th>
        <th>Fall</th>
        <th>Spring</th>
    </tr>
    </thead>
    <tbody id="results">
    <tr>
        <td colspan="6">No results yet.</td>
    </tr>
    </tbody>
</table>

<script>
    function searchUniversities() {
        const country = document.getElementById("country").value;
        const gpa = document.getElementById("gpa").value;

        const url = "/universities/search/basic?country=" + encodeURIComponent(country)
            + "&gpa=" + encodeURIComponent(gpa);

        fetch(url)
            .then(response => response.json())
            .then(universities => {
                displayResults(universities);
            })
            .catch(error => {
                console.error("Error searching universities:", error);
            });
    }

    function displayResults(universities) {
        const resultsTable = document.getElementById("results");
        resultsTable.innerHTML = "";

        if (universities.length === 0) {
            resultsTable.innerHTML = `
                    <tr>
                        <td colspan="6">No universities found.</td>
                    </tr>
                `;
            return;
        }

        universities.forEach(university => {
            const row = `
                    <tr>
                        <td>${university.name}</td>
                        <td>${university.country}</td>
                        <td>${university.minGpa}</td>
                        <td>${university.acceptsInternational}</td>
                        <td>${university.acceptsFall}</td>
                        <td>${university.acceptsSpring}</td>
                    </tr>
                `;

            resultsTable.innerHTML += row;
        });
    }
</script>
</body>
</html>
