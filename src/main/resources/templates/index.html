<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TransferPath</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f7f9fc;
            color: #222222;
        }

        h1 {
            color: #1f4e79;
        }

        .search-box {
            background-color: white;
            padding: 20px;
            border: 1px solid #dddddd;
            max-width: 600px;
            margin-bottom: 30px;
        }

        label {
            display: inline-block;
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        select {
            padding: 8px;
            width: 250px;
            margin-bottom: 10px;
        }

        input[type="checkbox"] {
            width: auto;
            margin-right: 6px;
        }

        button {
            padding: 10px 18px;
            background-color: #1f4e79;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #163a5c;
        }

        .secondary-button {
            background-color: #666666;
            margin-left: 8px;
        }

        .secondary-button:hover {
            background-color: #444444;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 1400px;
            background-color: white;
        }

        th,
        td {
            border: 1px solid #cccccc;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background-color: #e9eef5;
        }

        a {
            color: #1f4e79;
        }

        .fit-score {
            font-weight: bold;
            color: #1f4e79;
        }

        .fit-reasons {
            margin: 0;
            padding-left: 18px;
        }

        .fit-reasons li {
            margin-bottom: 4px;
        }
    </style>
</head>

<body>
<h1>TransferPath</h1>
<p>Find universities based on your transfer profile.</p>

<div class="search-box">
    <label for="country">Country:</label><br>
    <input type="text" id="country" placeholder="USA">

    <br>

    <label for="gpa">GPA:</label><br>
    <input type="number" id="gpa" step="0.1" placeholder="3.4">

    <br>

    <label for="international">Accepts International Students:</label><br>
    <select id="international">
        <option value="">Any</option>
        <option value="true">Yes</option>
        <option value="false">No</option>
    </select>

    <br>

    <label>
        <input type="checkbox" id="fall">
        Fall Admission
    </label>

    <br>

    <label>
        <input type="checkbox" id="spring">
        Spring Admission
    </label>

    <br>

    <button onclick="searchUniversities()">Search</button>
    <button onclick="clearSearch()" class="secondary-button">Clear Search</button>
</div>

<h2>Results</h2>

<div class="table-wrapper">
    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Fit Score</th>
            <th>Fit Reasons</th>
            <th>Location</th>
            <th>Country</th>
            <th>Minimum GPA</th>
            <th>International</th>
            <th>Fall</th>
            <th>Spring</th>
            <th>Deadline</th>
            <th>Website</th>
            <th>Application Portal</th>
            <th>Transfer Requirements</th>
        </tr>
        </thead>
        <tbody id="results">
        <tr>
            <td colspan="13">No results yet.</td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    window.addEventListener("load", function () {
        loadSearchFromUrl();

        if (window.location.search !== "") {
            searchUniversities(false);
        }
    });

    function searchUniversities(updateBrowserUrl = true) {
        const params = buildSearchParams();

        if (updateBrowserUrl) {
            const newUrl = window.location.pathname + "?" + params.toString();
            window.history.pushState({}, "", newUrl);
        }

        const apiUrl = "/universities/search/filter?" + params.toString();

        fetch(apiUrl)
            .then(response => response.json())
            .then(universities => {
                displayResults(universities);
            })
            .catch(error => {
                console.error("Error searching universities:", error);
            });
    }

    function buildSearchParams() {
        const country = document.getElementById("country").value;
        const gpa = document.getElementById("gpa").value;
        const international = document.getElementById("international").value;
        const fall = document.getElementById("fall").checked;
        const spring = document.getElementById("spring").checked;

        const params = new URLSearchParams();

        if (country !== "") {
            params.append("country", country);
        }

        if (gpa !== "") {
            params.append("gpa", gpa);
        }

        if (international !== "") {
            params.append("international", international);
        }

        if (fall) {
            params.append("fall", "true");
        }

        if (spring) {
            params.append("spring", "true");
        }

        return params;
    }

    function loadSearchFromUrl() {
        const params = new URLSearchParams(window.location.search);

        document.getElementById("country").value = params.get("country") || "";
        document.getElementById("gpa").value = params.get("gpa") || "";
        document.getElementById("international").value = params.get("international") || "";
        document.getElementById("fall").checked = params.get("fall") === "true";
        document.getElementById("spring").checked = params.get("spring") === "true";
    }

    function clearSearch() {
        document.getElementById("country").value = "";
        document.getElementById("gpa").value = "";
        document.getElementById("international").value = "";
        document.getElementById("fall").checked = false;
        document.getElementById("spring").checked = false;

        const resultsTable = document.getElementById("results");
        resultsTable.innerHTML = `
            <tr>
                <td colspan="13">No results yet.</td>
            </tr>
        `;

        window.history.pushState({}, "", window.location.pathname);
    }

    function yesOrNo(value) {
        if (value === true) {
            return "Yes";
        }

        return "No";
    }

    function buildFitReasonsList(fitReasons) {
        if (!fitReasons || fitReasons.length === 0) {
            return "N/A";
        }

        const items = fitReasons
            .map(reason => `<li>${reason}</li>`)
            .join("");

        return `<ul class="fit-reasons">${items}</ul>`;
    }

    function displayResults(universities) {
        const resultsTable = document.getElementById("results");
        resultsTable.innerHTML = "";

        if (universities.length === 0) {
            resultsTable.innerHTML = `
                <tr>
                    <td colspan="13">No universities found.</td>
                </tr>
            `;
            return;
        }

        universities.forEach(university => {
            const websiteLink = university.websiteUrl
                ? `<a href="${university.websiteUrl}" target="_blank">Visit website</a>`
                : "N/A";

            const location = `${university.city}, ${university.state}`;
            const fitReasonsList = buildFitReasonsList(university.fitReasons);

            const row = `
                <tr>
                    <td>${university.name}</td>
                    <td class="fit-score">${university.fitScore}</td>
                    <td>${fitReasonsList}</td>
                    <td>${location}</td>
                    <td>${university.country}</td>
                    <td>${university.minGpa}</td>
                    <td>${yesOrNo(university.acceptsInternational)}</td>
                    <td>${yesOrNo(university.acceptsFall)}</td>
                    <td>${yesOrNo(university.acceptsSpring)}</td>
                    <td>${university.applicationDeadline}</td>
                    <td>${websiteLink}</td>
                    <td>${university.applicationPortal}</td>
                    <td>${university.transferRequirements}</td>
                </tr>
            `;

            resultsTable.innerHTML += row;
        });
    }
</script>
</body>
</html>
